server {
    listen 80;

    # SSL is optional — enable by mounting cert and uncommenting
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/server.crt;
    # ssl_certificate_key /etc/nginx/ssl/server.key;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Basic auth — enabled by webapp-entrypoint.sh when RAVENS_SERVER_PASSWORD is set.
    # The browser-supplied credentials are forwarded as-is to the ravens runtime,
    # which validates them again against RAVENS_SERVER_PASSWORD / RAVENS_SERVER_USERNAME.
    # auth_basic "ravens";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # Redirect HTTP to HTTPS when SSL is enabled
    # if ($scheme = http) {
    #     return 301 https://$host$request_uri;
    # }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to ravens runtime
    location /ravens/ {
        # Attachment uploads post raw file bytes; the nginx default (1m)
        # 413s anything bigger before it reaches ravens. Slightly above
        # ravens' own 50MB cap so its clearer error wins.
        client_max_body_size 60m;
        proxy_pass http://runtime:4096/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
    }
}
