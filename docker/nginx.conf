server {
    listen 80;

    # SSL is optional — enable by mounting cert and uncommenting
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/server.crt;
    # ssl_certificate_key /etc/nginx/ssl/server.key;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect HTTP to HTTPS when SSL is enabled
    # if ($scheme = http) {
    #     return 301 https://$host$request_uri;
    # }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to ravens runtime
    location /ravens/ {
        proxy_pass http://runtime:4096/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Basic cmF2ZW5zOm5RMG9XUFdyRkNqeVRzRTkxemZXQnVFZmYyN0xTd2Vi";
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
    }
}
