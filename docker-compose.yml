services:
  runtime:
    build:
      context: .
      dockerfile: docker/Dockerfile.runtime
    environment:
      - RAVENS_CONFIG_DIR=/app/config
      # Required — set it in .env or the shell; there is deliberately no default.
      - RAVENS_SERVER_PASSWORD=${RAVENS_SERVER_PASSWORD:?RAVENS_SERVER_PASSWORD must be set}
      - RAVENS_SERVER_USERNAME=${RAVENS_SERVER_USERNAME:-ravens}
    volumes:
      - ./data/runtime-config:/app/config
      - ./data/runtime-data:/root/.local/share/ravens
      - ./data/global-config:/root/.config/ravens
      - ./data/agents:/root/.agents
    # Internal only — webapp proxies to it
    expose:
      - "4096"

  webapp:
    build:
      context: .
      dockerfile: docker/Dockerfile.webapp
    environment:
      # nginx prompts the browser for these same credentials and forwards them
      # to the runtime, which validates them again.
      - RAVENS_SERVER_PASSWORD=${RAVENS_SERVER_PASSWORD:?RAVENS_SERVER_PASSWORD must be set}
      - RAVENS_SERVER_USERNAME=${RAVENS_SERVER_USERNAME:-ravens}
    ports:
      - "${WEBAPP_PORT:-5090}:80"
      - "${WEBAPP_HTTPS_PORT:-5443}:443"
    volumes:
      - ./data/ssl:/etc/nginx/ssl
    depends_on:
      - runtime
